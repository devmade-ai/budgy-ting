<!--
  App icon source — rasterized by scripts/generate-icons.mjs via sharp.

  Requirement: Icon must render identically in CI (Ubuntu) and locally.
  Approach: Geometric F built from SVG rect paths — no font dependency at all.
  Alternatives:
    - <text> with serif font: Rejected — renders differently across OS/CI (Ubuntu
      lacks Georgia; generic serif varies).
    - Outlined font via fontforge: Rejected — external tooling dependency for a
      single glyph; hand-tuned paths are simpler and more controllable.
  Design: Bold F monogram — top bar, crossbar, vertical stem.
    Slightly right-shifted to optically center the left-heavy letterform.
    Background uses cmyk theme primary (#45aeee) to match Farlume branding.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" shape-rendering="geometricPrecision">
  <rect width="512" height="512" rx="92" fill="#45aeee"/>
  <path fill="white" d="
    M 152 108
    H 372
    V 168
    H 216
    V 232
    H 340
    V 292
    H 216
    V 404
    H 152
    Z
  "/>
</svg>
