<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Requirement: PWA status bar color must match active theme combo
         Approach: Initial values match default combo (vivid = cmyk/night). Flash prevention
           script updates these before first paint. useDarkMode.ts composable
           updates them on subsequent toggles/combo changes.
         Reference: glow-props docs/implementations/THEME_DARK_MODE.md -->
    <meta name="theme-color" content="#45aeee" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Plan and track expenses against budgets" />
    <!-- Requirement: Improve iOS standalone PWA appearance
         Approach: apple-mobile-web-app meta tags for status bar, title, and splash -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Farlume" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" />
    <title>Farlume</title>
    <!-- Requirement: Prevent white flash on dark mode page load
         Approach: Classic (non-module) inline script reads localStorage and applies
           both .dark class (Tailwind) and data-theme (DaisyUI) before first paint.
           Duplicates the combo lookup logic from useDarkMode.ts — composable runs
           after Vue mount, too late for first paint.
         Why classic script: Module scripts are deferred — they run after DOM parse.
         Reference: glow-props docs/implementations/THEME_DARK_MODE.md -->
    <script>
      (function() {
        try {
          var combos = {
            vivid: { light: 'cmyk', dark: 'night', mcL: '#45aeee', mcD: '#0f172a' }
          };
          var stored = localStorage.getItem('darkMode');
          var isDark = stored !== null
            ? stored === 'true'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          var comboId = localStorage.getItem('themeCombo') || 'vivid';
          var combo = combos[comboId] || combos.vivid;
          var theme = isDark ? combo.dark : combo.light;
          var root = document.documentElement;
          if (isDark) root.classList.add('dark');
          root.setAttribute('data-theme', theme);
          var mc = isDark ? combo.mcD : combo.mcL;
          var metas = document.querySelectorAll('meta[name="theme-color"]');
          for (var i = 0; i < metas.length; i++) metas[i].setAttribute('content', mc);
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <!-- Requirement: Capture beforeinstallprompt before Vue modules load
         Approach: Classic (non-module) inline script runs synchronously during
           HTML parse, before any <script type="module"> begins loading.
           Stashes the event on window for usePWAInstall.ts to consume.
         Why: On repeat visits with a cached SW, the browser fires
           beforeinstallprompt before module scripts execute — losing the event.
         Reference: glow-props docs/implementations/PWA_SYSTEM.md -->
    <script>
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__pwaInstallPromptEvent = e;
      });
    </script>
    <!-- Requirement: Capture errors before JS bundles load, warn on load failure
         Approach: Inline script with vanilla JS error buffer, global error listeners,
           and 20-second loading timeout. Bridges to Vue debug system via
           window.__debugPushError(). Vue app calls window.__debugClearLoadTimer()
           on mount to cancel the timeout.
         Why: The Vue DebugPill can't catch bundle load failures — it IS the bundle.
           This inline script covers that critical gap.
         Reference: glow-props docs/implementations/DEBUG_SYSTEM.md -->
    <script>
      // Pre-framework error buffer
      window.__debugErrors = [];
      window.__debugPushError = function(msg, stack) {
        window.__debugErrors.push({ msg: msg, stack: stack || '', time: Date.now() });
        if (window.__debugErrors.length > 200) window.__debugErrors.shift();
        // Update inline pill badge if it exists
        var badge = document.getElementById('debug-inline-count');
        if (badge) { badge.textContent = window.__debugErrors.length; badge.style.display = ''; }
      };

      // Capture errors before module scripts load.
      // Once debugLog.ts loads, it sets __debugLogReady and handles errors itself.
      // These listeners yield to prevent duplicate entries.
      window.addEventListener('error', function(e) {
        if (window.__debugLogReady) return;
        window.__debugPushError(e.message || 'Unknown error', e.filename + ':' + e.lineno);
      });
      window.addEventListener('unhandledrejection', function(e) {
        if (window.__debugLogReady) return;
        window.__debugPushError('Unhandled rejection: ' + e.reason);
      });

      // Loading timeout — warn user if Vue fails to mount within 20s
      window.__debugVueMounted = false;
      window.__debugClearLoadTimer = function() {
        window.__debugVueMounted = true;
        clearTimeout(window.__debugLoadTimer);
        // Hide inline pill + panel — Vue DebugPill takes over
        var pill = document.getElementById('debug-inline-pill');
        if (pill) pill.style.display = 'none';
        var panel = document.getElementById('debug-inline-panel');
        if (panel) panel.style.display = 'none';
      };
      window.__debugLoadTimer = setTimeout(function() {
        if (!window.__debugVueMounted) {
          // Show warning in inline pill
          var pill = document.getElementById('debug-inline-pill');
          if (pill) {
            pill.style.background = '#92400e';
            pill.title = 'App is taking longer than usual to load. Errors: ' + window.__debugErrors.length;
          }
          // Add warning to app container
          var app = document.getElementById('app');
          if (app && !app.hasChildNodes()) {
            var warning = document.createElement('p');
            warning.style.cssText = 'color:#eab308;font-size:14px;text-align:center;padding:40px 20px;font-family:system-ui,sans-serif';
            warning.textContent = 'This is taking longer than usual. Try reloading the page.';
            app.appendChild(warning);
          }
        }
      }, 20000);

      // Create minimal inline pill + error panel (pure DOM, no framework)
      (function() {
        var pill = document.createElement('button');
        pill.id = 'debug-inline-pill';
        pill.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:80;background:#111827;color:#fff;font-size:12px;font-family:monospace;padding:6px 12px;border-radius:9999px;border:none;cursor:pointer;box-shadow:0 4px 6px rgba(0,0,0,.3);display:flex;align-items:center;gap:6px';
        pill.innerHTML = '<span>dbg</span><span id="debug-inline-count" style="color:#ef4444;display:none">0</span>';

        // Error panel — toggled by pill click, shows captured errors
        var panel = document.createElement('div');
        panel.id = 'debug-inline-panel';
        panel.style.cssText = 'position:fixed;bottom:52px;right:16px;z-index:80;background:#111827;color:#e5e7eb;font-size:11px;font-family:monospace;padding:8px;border-radius:8px;width:calc(100vw - 2rem);max-width:320px;max-height:40vh;overflow-y:auto;box-shadow:0 10px 25px rgba(0,0,0,.5);display:none;white-space:pre-wrap;word-break:break-all;line-height:1.5';
        document.body.appendChild(panel);

        pill.onclick = function() {
          if (panel.style.display === 'none') {
            var msgs = window.__debugErrors.map(function(e) {
              return new Date(e.time).toLocaleTimeString() + ' ' + e.msg;
            }).join('\n');
            panel.textContent = msgs || 'No errors captured.';
            panel.style.display = 'block';
          } else {
            panel.style.display = 'none';
          }
        };
        document.body.appendChild(pill);
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
