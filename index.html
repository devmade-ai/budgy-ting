<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Requirement: Dynamic theme-color for dark/light mode
         Approach: Two meta tags with media queries cover OS preference before JS loads.
           useDarkMode.ts dynamically updates both tags on manual toggle.
         Reference: glow-props CLAUDE.md "Theme & Dark Mode — Meta Theme-Color" -->
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#14142a" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Plan and track expenses against budgets" />
    <!-- Requirement: Improve iOS standalone PWA appearance
         Approach: apple-mobile-web-app meta tags for status bar, title, and splash -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="budgy-ting" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" />
    <title>budgy-ting</title>
    <!-- Requirement: Prevent white flash on dark mode page load
         Approach: Classic (non-module) inline script reads localStorage and applies
           .dark class before first paint. Same early-capture pattern as PWA
           beforeinstallprompt script. Must duplicate the localStorage/matchMedia
           logic from useDarkMode.ts — the composable runs after Vue mount, too late.
         Why classic script: Module scripts are deferred — they run after DOM parse.
         Reference: glow-props CLAUDE.md "Theme & Dark Mode — Flash Prevention" -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('darkMode');
          var isDark = stored !== null
            ? stored === 'true'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <!-- Requirement: Capture beforeinstallprompt before Vue modules load
         Approach: Classic (non-module) inline script runs synchronously during
           HTML parse, before any <script type="module"> begins loading.
           Stashes the event on window for usePWAInstall.ts to consume.
         Why: On repeat visits with a cached SW, the browser fires
           beforeinstallprompt before module scripts execute — losing the event.
         Reference: glow-props CLAUDE.md "PWA Install Prompt Race Condition" -->
    <script>
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__pwaInstallPromptEvent = e;
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
